<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>수조 모니터링</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="monitoring-screen">
  <div class="monitoring-container">
    <button class="analyze-btn">AI 분석하기</button>

    <div class="metrics">
      <div class="metric"><strong>온도</strong><br><span>17°C</span></div>
      <div class="metric"><strong>용존산소량</strong><br><span>25%</span></div>
      <div class="metric"><strong>pH</strong><br><span>43%</span></div>
      <div class="metric"><strong>부유물질</strong><br><span>50%</span></div>
      <div class="metric"><strong>탁도</strong><br><span>15%</span></div>
    </div>
  </div>
</body>
</html>
